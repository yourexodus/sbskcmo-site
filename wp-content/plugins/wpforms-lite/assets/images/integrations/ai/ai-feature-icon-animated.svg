	<defs>
		<style>
			@keyframes sparkle {
				0% { opacity: 1; }
				20% { opacity: 0.5; }
				40% { opacity: 1; }
				60% { opacity: 0.5; }
				80% { opacity: 1; }
				100% { opacity: 1; }
			}
			.sparkle-shape {
				fill: #7a30e2;
				animation: sparkle ease-in-out infinite;
			}
			.sparkle-shape-1 { animation-duration: 1.25s; animation-delay: .62s; }
			.sparkle-shape-2 { animation-duration: 0.85s; animation-delay: 0s; }
			.sparkle-shape-3 { animation-duration: 1.1s;  animation-delay: .31s; }
		</style>
